name: Edge Functions Type Check

# Garante que todas as edge functions em supabase/functions/ passam no
# type-check do Deno antes de qualquer deploy. Roda em PRs e em push para
# main / master quando arquivos relevantes mudam.

on:
  push:
    branches: [main, master]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/edge-functions-typecheck.yml"
  pull_request:
    paths:
      - "supabase/functions/**"
      - ".github/workflows/edge-functions-typecheck.yml"
  workflow_dispatch:

# Cancela execuções anteriores no mesmo ref para economizar minutos.
concurrency:
  group: edge-functions-typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: deno check supabase/functions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Discover edge function entrypoints
        id: discover
        run: |
          set -euo pipefail
          # Coleta todos os index.ts diretamente sob supabase/functions/<name>/
          # (ignora _shared/, que é validado transitivamente pelos imports).
          mapfile -t files < <(find supabase/functions -mindepth 2 -maxdepth 2 -name 'index.ts' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "Nenhuma edge function encontrada em supabase/functions/." >&2
            exit 1
          fi

          echo "Encontradas ${#files[@]} edge functions:"
          printf '  - %s\n' "${files[@]}"

          # Exporta como string única separada por espaço para o próximo step.
          echo "files=${files[*]}" >> "$GITHUB_OUTPUT"

      - name: Type-check all edge functions
        run: |
          set -euo pipefail
          # `deno check` reporta TODOS os erros de cada arquivo antes de sair.
          # Passamos todos os entrypoints de uma vez para reaproveitar o cache
          # de módulos compartilhados (ex.: supabase/functions/_shared/*).
          # shellcheck disable=SC2086
          deno check ${{ steps.discover.outputs.files }}
