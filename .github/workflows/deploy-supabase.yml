name: Deploy Supabase

# Required repo secrets:
#   SUPABASE_ACCESS_TOKEN  - Personal access token (Dashboard > Account > Access Tokens)
#   SUPABASE_DB_PASSWORD   - Database password for project pieenhgjulsrjlioozsy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:
    inputs:
      function:
        description: 'Specific function to deploy (empty = all functions)'
        required: false
        type: string
        default: ''
      skip_migrations:
        description: 'Skip supabase db push'
        required: false
        type: boolean
        default: false

concurrency:
  group: supabase-deploy-prod
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: pieenhgjulsrjlioozsy
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    name: Apply migrations and deploy functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations (supabase db push)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_migrations != true }}
        run: supabase db push

      - name: Deploy single function
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.function != '' }}
        run: supabase functions deploy "${{ inputs.function }}" --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy all functions
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.function == '' }}
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
